<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340"
     width="700" height="340" style="background:#1A1A2E">
  <style>
    text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
  </style>
  <text x="350" y="40" text-anchor="middle" fill="#E8634A" font-size="20" font-weight="600">A Caixa-Preta</text>
<defs>
    <marker id="arrowBP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
  </defs>
<rect x="30" y="102" width="120" height="36" rx="6" fill="#2AABB3" fill-opacity="0.15" stroke="#2AABB3" stroke-width="1.5"/>
<text x="90" y="125" text-anchor="middle" fill="#2AABB3" font-size="12">Dados pessoais</text>
<line x1="150" y1="120" x2="230" y2="170" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowBP)"/>
<rect x="30" y="152" width="120" height="36" rx="6" fill="#2AABB3" fill-opacity="0.15" stroke="#2AABB3" stroke-width="1.5"/>
<text x="90" y="175" text-anchor="middle" fill="#2AABB3" font-size="12">Renda</text>
<line x1="150" y1="170" x2="230" y2="170" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowBP)"/>
<rect x="30" y="202" width="120" height="36" rx="6" fill="#2AABB3" fill-opacity="0.15" stroke="#2AABB3" stroke-width="1.5"/>
<text x="90" y="225" text-anchor="middle" fill="#2AABB3" font-size="12">Histórico</text>
<line x1="150" y1="220" x2="230" y2="170" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowBP)"/>
<rect x="230" y="100" width="220" height="140" rx="10" fill="#0D0D0D" stroke="#6B7280" stroke-width="2"/>
<text x="340" y="160" text-anchor="middle" fill="#6B7280" font-size="16">???</text>
<text x="340" y="185" text-anchor="middle" fill="#6B7280" font-size="11">milhões de pesos</text>
<text x="340" y="200" text-anchor="middle" fill="#6B7280" font-size="11">opacos e inexplicáveis</text>
<line x1="450" y1="170" x2="530" y2="170" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowBP)"/>
<rect x="530" y="145" width="140" height="50" rx="8" fill="#E8634A" fill-opacity="0.2" stroke="#E8634A" stroke-width="2"/>
<text x="600" y="168" text-anchor="middle" fill="#E8634A" font-size="13" font-weight="600">Crédito negado</text>
<text x="600" y="185" text-anchor="middle" fill="#F4A393" font-size="11">Sem explicação</text>
<text x="350" y="290" text-anchor="middle" fill="#8B5CF6" font-size="14" font-style="italic">"Por que fui negado?"</text>
<text x="350" y="310" text-anchor="middle" fill="#6B7280" font-size="12">O sistema não sabe responder.</text>
</svg>